<nav
  style="
    position: sticky;
    top: 0;
    background-color: rgba(10, 10, 10, 0.9);
    border-bottom: 1px solid var(--muted);
    padding: 1rem 0;
    z-index: 100;
    backdrop-filter: blur(5px);
  "
>
  <div
    style="display: flex; gap: 2rem; overflow-x: auto; padding-bottom: 0.5rem"
  >
    @for (link of links; track link.id) {
      <a
        [href]="'#' + link.id"
        [style.color]="
          activeSection === link.id ? 'var(--accent)' : 'var(--text-secondary)'
        "
        [style.font-weight]="activeSection === link.id ? 'bold' : 'normal'"
        style="white-space: nowrap"
      >
        @if (activeSection === link.id) {
          <span style="margin-right: 0.5rem">&gt;</span>
        }
        {{ link.label }}
        @if (activeSection === link.id) {
          <span class="cursor-blink" style="margin-left: 2px">_</span>
        }
      </a>
    }
  </div>
</nav>
