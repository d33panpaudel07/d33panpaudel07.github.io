<section id="contact" style="padding: 4rem 0; margin-bottom: 4rem">
  <h2
    style="margin-bottom: 2rem; color: var(--text-secondary); font-size: 1.2rem"
  >
    <span style="color: var(--text-secondary); white-space: nowrap"
      >user&#64;portfolio:~$</span
    >
    <span style="color: var(--text-primary)"> ./contact.exe</span>
    <span class="cursor-blink">_</span>
  </h2>

  <div style="display: flex; flex-direction: column; gap: 2rem">
    <form
      (ngSubmit)="handleSubmit()"
      #contactForm="ngForm"
      style="
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        background-color: rgba(10, 10, 10, 0.8);
        border: 1px solid var(--muted);
        padding: 2rem;
      "
    >
      <div class="contact-row">
        <label>NAME:</label>
        <span class="prompt">user&#64;portfolio:~$</span>
        <input
          type="text"
          name="name"
          [(ngModel)]="formData.name"
          required
          class="terminal-input"
          style="flex: 1; min-width: 0"
          autocomplete="off"
        />
      </div>

      <div class="contact-row">
        <label>EMAIL:</label>
        <span class="prompt">user&#64;portfolio:~$</span>
        <input
          type="email"
          name="email"
          [(ngModel)]="formData.email"
          required
          class="terminal-input"
          style="flex: 1; min-width: 0"
          autocomplete="off"
        />
      </div>

      <div style="display: flex; align-items: flex-start; gap: 0.75rem">
        <label
          style="
            min-width: 70px;
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-top: 0.2rem;
          "
          >MSG:</label
        >
        <span
          style="
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-top: 0.2rem;
          "
          >&gt;</span
        >
        <textarea
          name="message"
          [(ngModel)]="formData.message"
          required
          rows="4"
          class="terminal-textarea"
          style="flex: 1; min-width: 0"
        ></textarea>
      </div>

      <div style="margin-top: 0.5rem">
        <button
          type="submit"
          [disabled]="!contactForm.form.valid"
          style="width: 100%; text-align: left"
        >
          &gt; send_message.exe
        </button>
      </div>
    </form>

    <div
      class="social-links"
      style="
        background-color: rgba(10, 10, 10, 0.8);
        border: 1px solid var(--muted);
        padding: 2rem;
      "
    >
      <h3
        style="
          color: var(--text-secondary);
          margin-bottom: 1rem;
          font-size: 1rem;
        "
      >
        AVAILABLE NETWORKS:
      </h3>
      <div style="display: flex; flex-direction: column; gap: 1rem">
        <a
          href="https://github.com"
          target="_blank"
          rel="noopener noreferrer"
          style="display: flex; align-items: center; gap: 0.75rem"
        >
          <span style="color: var(--text-secondary)">&gt; ssh github</span>
          <span style="color: var(--accent)">[CONNECT]</span>
        </a>
        <a
          href="https://linkedin.com"
          target="_blank"
          rel="noopener noreferrer"
          style="display: flex; align-items: center; gap: 0.75rem"
        >
          <span style="color: var(--text-secondary)"
            >&gt; connect linkedin</span
          >
          <span style="color: var(--accent)">[CONNECT]</span>
        </a>
      </div>
    </div>
  </div>
</section>
